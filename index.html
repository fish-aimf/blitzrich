<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WoT Blitz Player/Tank Lookup</title>
</head>
<body>

<h2>WoT Blitz Player Lookup</h2>

<label>Application ID: <input type="text" id="appId"></label><br><br>
<label>Server:
  <select id="server">
    <option value="com">NA (com)</option>
    <option value="eu">EU</option>
    <option value="asia">Asia</option>
  </select>
</label><br><br>
<label>Search Player: <input type="text" id="searchInput"></label>
<button onclick="searchPlayers()">Search</button>

<h3>Results:</h3>
<ul id="playerResults"></ul>

<h3 id="tankHeader" style="display:none;">Tanks:</h3>
<p id="totalsSummary"></p>
<p id="exclusionDisclaimer" style="font-size:0.9em;color:#555;"></p>
<ul id="tankResults"></ul>

<script>
function getApiBase() {
  const server = document.getElementById("server").value; // com, eu, or asia
  return `https://api.wotblitz.${server}/wotb`;
}

async function searchPlayers() {
  const API_BASE = getApiBase();
  const appId = document.getElementById("appId").value.trim();
  const search = document.getElementById("searchInput").value.trim();
  const resultsList = document.getElementById("playerResults");
  resultsList.innerHTML = "";
  document.getElementById("tankResults").innerHTML = "";
  document.getElementById("tankHeader").style.display = "none";
  document.getElementById("totalsSummary").textContent = "";
  document.getElementById("exclusionDisclaimer").textContent = "";

  if (!appId || !search) {
    alert("Please enter both an Application ID and a search term.");
    return;
  }

  const url = `${API_BASE}/account/list/?application_id=${appId}&search=${encodeURIComponent(search)}`;

  try {
    const response = await fetch(url);
    const data = await response.json();

    if (data.status !== "ok") {
      resultsList.innerHTML = `<li>Error: ${data.error ? data.error.message : "Unknown error"}</li>`;
      return;
    }

    if (!data.data || data.data.length === 0) {
      resultsList.innerHTML = "<li>No players found.</li>";
      return;
    }

    data.data.forEach(player => {
      const li = document.createElement("li");
      const link = document.createElement("a");
      link.href = "#";
      link.textContent = player.nickname;
      link.onclick = (e) => {
        e.preventDefault();
        getPlayerTanks(appId, player.account_id, player.nickname);
      };
      li.appendChild(link);
      resultsList.appendChild(li);
    });

  } catch (err) {
    resultsList.innerHTML = `<li>Request failed: ${err}</li>`;
  }
}

async function getPlayerTanks(appId, accountId, nickname) {
  const API_BASE = getApiBase();
  const tankHeader = document.getElementById("tankHeader");
  const tankList = document.getElementById("tankResults");
  tankList.innerHTML = "<li>Loading...</li>";
  tankHeader.style.display = "block";
  tankHeader.textContent = `Tanks for ${nickname}:`;

  const statsUrl = `${API_BASE}/tanks/stats/?application_id=${appId}&account_id=${accountId}`;

  try {
    const statsResponse = await fetch(statsUrl);
    const statsData = await statsResponse.json();

    if (statsData.status !== "ok") {
      tankList.innerHTML = `<li>Error: ${statsData.error ? statsData.error.message : "Unknown error"}</li>`;
      return;
    }

    const tankStats = statsData.data[accountId];
    if (!tankStats || tankStats.length === 0) {
      tankList.innerHTML = "<li>No tanks found for this player.</li>";
      return;
    }

    // No cap here - every tank_id the account owns gets processed,
    // split into chunks only because the API rejects >100 IDs per call.
    const CHUNK_SIZE = 100;
    const allTankIds = tankStats.map(t => t.tank_id);
    const chunks = [];
    for (let i = 0; i < allTankIds.length; i += CHUNK_SIZE) {
      chunks.push(allTankIds.slice(i, i + CHUNK_SIZE));
    }

    const encyData = {};
    for (const chunk of chunks) {
      // No "fields" param here - we didn't have a live API key to confirm
      // exact field names for wotb, and specifying wrong ones causes
      // INVALID_FIELDS. Fetching the full default object is safer, and we
      // pull out whatever price/premium keys actually exist below.
      const encyUrl = `${API_BASE}/encyclopedia/vehicles/?application_id=${appId}&tank_id=${chunk.join(",")}`;
      const encyResponse = await fetch(encyUrl);
      const chunkData = await encyResponse.json();

      if (chunkData.status !== "ok") {
        tankList.innerHTML = `<li>Error: ${chunkData.error ? chunkData.error.message : "Unknown error"}</li>`;
        return;
      }

      Object.assign(encyData, chunkData.data);
    }

    // Debug aid: open browser dev tools (F12) -> Console to inspect the
    // full vehicle object if anything ever looks wrong again.
    console.log("Sample vehicle data from encyclopedia:", Object.values(encyData)[0]);

    tankList.innerHTML = "";
    let shown = 0;
    let totalSellGold = 0;
    let totalSellCredit = 0;
    const excluded = [];

    tankStats.forEach(t => {
      const tankInfo = encyData[t.tank_id];

      if (!tankInfo) {
        // Special/event/Rating Battle-exclusive vehicles aren't in
        // Wargaming's public encyclopedia, so we have no name, tier, or
        // price data for them - they can't be counted in the totals.
        excluded.push(`tank_id ${t.tank_id} (no public data)`);
        const li = document.createElement("li");
        li.textContent = `Special/event vehicle (tank_id ${t.tank_id}) - no public data available`;
        tankList.appendChild(li);
        shown++;
        return;
      }

      // Confirmed real field locations: price data lives inside a nested
      // "cost" object, not top-level.
      const isPremium = !!tankInfo.is_premium;
      const priceGold = (tankInfo.cost && tankInfo.cost.price_gold) || 0;
      const priceCredit = (tankInfo.cost && tankInfo.cost.price_credit) || 0;

      // Heuristic: Collector tanks are non-tech-tree vehicles bought with
      // credits only (no gold price). This is inferred, not an official flag.
      const isCollector = isPremium && priceCredit > 0 && !priceGold;

      // Selling any tank refunds 50% of its purchase price, in whichever
      // currency it was bought with (per Wargaming's Update 10.8 policy).
      // A tank with a gold price sells for gold; otherwise it sells for
      // credits. We don't double count both currencies for the same tank.
      if (priceGold > 0) {
        totalSellGold += priceGold * 0.5;
      } else if (priceCredit > 0) {
        totalSellCredit += priceCredit * 0.5;
      } else {
        excluded.push(`${tankInfo.name} (no price data)`);
      }

      const li = document.createElement("li");
      li.textContent = `${tankInfo.name} - Tier ${tankInfo.tier}${isCollector ? " (Collector)" : ""}`;
      tankList.appendChild(li);
      shown++;
    });

    tankHeader.textContent = `Tanks for ${nickname}: (showing ${shown} of ${tankStats.length} owned)`;

    document.getElementById("totalsSummary").textContent =
      `Est. gold if all sold: ${Math.round(totalSellGold).toLocaleString()} | ` +
      `Est. credits if all sold: ${Math.round(totalSellCredit).toLocaleString()}`;

    document.getElementById("exclusionDisclaimer").textContent = excluded.length
      ? `Disclaimer: ${excluded.length} tank(s) excluded from these totals due to missing data - ${excluded.join(", ")}`
      : "";

  } catch (err) {
    tankList.innerHTML = `<li>Request failed: ${err}</li>`;
  }
}
</script>

</body>
</html>
